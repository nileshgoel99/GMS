# /etc/nginx/sites-available/gms — CRA + Django both use /static/; the ^~ /static/js/ and
# /static/css/ blocks must come before location /static/ or the React bundle 404s (blank app).
# Install: sudo cp scripts/nginx-gms-site.conf /etc/nginx/sites-available/gms && sudo nginx -t && sudo systemctl reload nginx

server {
    server_name gms.nileshgoel.in;

    root /var/www/gms/frontend/build;
    index index.html;

    client_max_body_size 25m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React (CRA) — priority over generic /static/ below
    location ^~ /static/js/ {
        alias /var/www/gms/frontend/build/static/js/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location ^~ /static/css/ {
        alias /var/www/gms/frontend/build/static/css/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /static/ {
        alias /var/www/gms/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/gms/backend/media/;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/gms.nileshgoel.in/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/gms.nileshgoel.in/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = gms.nileshgoel.in) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name gms.nileshgoel.in;
    return 404; # managed by Certbot
}
